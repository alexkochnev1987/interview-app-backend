services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: interview_app
      POSTGRES_PASSWORD: localpass
      POSTGRES_DB: interview_app_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  s3:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"   # S3 API
      - "9003:9001"   # Web UI (удобно смотреть файлы)
    volumes:
      - s3data:/data

  # Создаёт bucket при старте
  s3-init:
    image: minio/mc
    depends_on:
      - s3
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://s3:9000 minioadmin minioadmin;
      mc mb local/interview-app-local --ignore-existing;
      exit 0;
      "

volumes:
  pgdata:
  s3data:
