services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://interview_app:localpass@db:5432/interview_app_dev
      - AWS_S3_BUCKET=local-bucket
      - S3_PREFIX=dev/
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: interview_app
      POSTGRES_PASSWORD: localpass
      POSTGRES_DB: interview_app_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
