name: Backend CI/CD

on:
  push:
    branches: [develop, main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'Dockerfile'
      - 'docker-compose.lightsail.yml'
      - 'deploy/lightsail/**'
      - 'scripts/lightsail/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'nest-cli.json'
      - '.github/workflows/**'
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: interview_app
          POSTGRES_PASSWORD: localpass
          POSTGRES_DB: interview_app_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U interview_app -d interview_app_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://interview_app:localpass@localhost:5433/interview_app_test
      JWT_SECRET: ci-integration-test-jwt-secret
      FRONTEND_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run migrations:check
      - if: github.event_name == 'pull_request'
        run: npm run migrations:check -- --base-ref "origin/${{ github.base_ref }}"
      - run: npm run lint
      - run: npm run build
      - run: npm run openapi:check
      - run: npm run test
      - run: npm run test:integration
      - run: npm run test:pyramid:check

  deploy-lightsail:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      LIGHTSAIL_HOST: ${{ vars.LIGHTSAIL_HOST }}
      LIGHTSAIL_USER: ${{ vars.LIGHTSAIL_USER || 'ubuntu' }}
      REMOTE_DIR: ${{ github.ref == 'refs/heads/main' && '/home/ubuntu/interview-app-backend-prod' || '/home/ubuntu/interview-app-backend-dev' }}
      BACKEND_SERVICE: ${{ github.ref == 'refs/heads/main' && 'backend-prod' || 'backend-dev' }}
      COMPOSE_PROJECT_NAME: interview-app-backend
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail
          chmod 600 ~/.ssh/lightsail
          ssh-keyscan -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts

      - name: Prepare Lightsail directory
        run: |
          ssh -i ~/.ssh/lightsail "$LIGHTSAIL_USER@$LIGHTSAIL_HOST" "REMOTE_DIR='$REMOTE_DIR' bash -s" <<'SH'
          set -euo pipefail
          mkdir -p "$REMOTE_DIR"
          if [ ! -f "$REMOTE_DIR/.env.lightsail" ] && [ -f /home/ubuntu/interview-app-backend/.env.lightsail ]; then
            cp /home/ubuntu/interview-app-backend/.env.lightsail "$REMOTE_DIR/.env.lightsail"
          fi
          test -f "$REMOTE_DIR/.env.lightsail"
          SH

      - name: Sync source to Lightsail
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'dist/' \
            --exclude 'backups/' \
            --exclude '.env' \
            --exclude '.env.lightsail' \
            -e "ssh -i ~/.ssh/lightsail" \
            ./ "$LIGHTSAIL_USER@$LIGHTSAIL_HOST:$REMOTE_DIR/"

      - name: Build, migrate, and restart backend
        run: |
          ssh -i ~/.ssh/lightsail "$LIGHTSAIL_USER@$LIGHTSAIL_HOST" "REMOTE_DIR='$REMOTE_DIR' BACKEND_SERVICE='$BACKEND_SERVICE' COMPOSE_PROJECT_NAME='$COMPOSE_PROJECT_NAME' GIT_SHA='$GIT_SHA' bash -s" <<'SH'
          set -euo pipefail
          cd "$REMOTE_DIR"
          test -f .env.lightsail
          sudo GIT_SHA="$GIT_SHA" docker compose --project-name "$COMPOSE_PROJECT_NAME" --env-file .env.lightsail -f docker-compose.lightsail.yml run --rm --no-deps --build -T migrate < /dev/null
          sudo GIT_SHA="$GIT_SHA" docker compose --project-name "$COMPOSE_PROJECT_NAME" --env-file .env.lightsail -f docker-compose.lightsail.yml up -d --no-deps --build "$BACKEND_SERVICE"
          sudo docker compose --project-name "$COMPOSE_PROJECT_NAME" --env-file .env.lightsail -f docker-compose.lightsail.yml ps "$BACKEND_SERVICE"
          SH

      - name: Verify health
        run: |
          if [ "$BACKEND_SERVICE" = "backend-prod" ]; then
            HEALTH_URL="http://$LIGHTSAIL_HOST/prod/health"
          else
            HEALTH_URL="http://$LIGHTSAIL_HOST/health"
          fi
          for attempt in {1..30}; do
            if curl --fail --show-error --silent "$HEALTH_URL"; then
              exit 0
            fi
            sleep 2
          done
          curl --fail --show-error "$HEALTH_URL"
