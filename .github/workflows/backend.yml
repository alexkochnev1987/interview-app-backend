name: Backend CI/CD

on:
  push:
    branches: [develop, main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'Dockerfile'
      - 'docker-compose.lightsail.yml'
      - 'deploy/lightsail/**'
      - 'scripts/lightsail/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: interview_app
          POSTGRES_PASSWORD: localpass
          POSTGRES_DB: interview_app_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U interview_app -d interview_app_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://interview_app:localpass@localhost:5433/interview_app_test
      JWT_SECRET: ci-integration-test-jwt-secret
      FRONTEND_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm run openapi:check
      - run: npm run test
      - run: npm run test:integration
      - run: npm run test:pyramid:check

  deploy-lightsail:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      LIGHTSAIL_HOST: ${{ vars.LIGHTSAIL_HOST }}
      LIGHTSAIL_USER: ${{ vars.LIGHTSAIL_USER || 'ubuntu' }}
      REMOTE_DIR: /home/ubuntu/interview-app-backend
      BACKEND_SERVICE: ${{ github.ref == 'refs/heads/main' && 'backend-prod' || 'backend-dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail
          chmod 600 ~/.ssh/lightsail
          ssh-keyscan -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts

      - name: Sync source to Lightsail
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'dist/' \
            --exclude 'backups/' \
            --exclude '.env' \
            --exclude '.env.lightsail' \
            -e "ssh -i ~/.ssh/lightsail" \
            ./ "$LIGHTSAIL_USER@$LIGHTSAIL_HOST:$REMOTE_DIR/"

      - name: Build, migrate, and restart backend
        run: |
          ssh -i ~/.ssh/lightsail "$LIGHTSAIL_USER@$LIGHTSAIL_HOST" "BACKEND_SERVICE='$BACKEND_SERVICE' bash -s" <<'SH'
          set -euo pipefail
          cd /home/ubuntu/interview-app-backend
          test -f .env.lightsail
          sudo docker compose --env-file .env.lightsail -f docker-compose.lightsail.yml run --rm --build migrate
          sudo docker compose --env-file .env.lightsail -f docker-compose.lightsail.yml up -d --build "$BACKEND_SERVICE" caddy
          sudo docker compose --env-file .env.lightsail -f docker-compose.lightsail.yml ps
          SH

      - name: Verify health
        run: |
          if [ "$BACKEND_SERVICE" = "backend-prod" ]; then
            curl --fail --show-error --silent "http://$LIGHTSAIL_HOST/prod/health"
          else
            curl --fail --show-error --silent "http://$LIGHTSAIL_HOST/health"
          fi
