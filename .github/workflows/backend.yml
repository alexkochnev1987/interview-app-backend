name: Backend CI/CD

on:
  push:
    branches: [develop, main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  pull_request:
    branches: [develop, main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: interview-app-backend
  ECS_CLUSTER: interview-app
  PROJECT_NAME: interview-app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run lint
      - run: npm run test

  build-and-deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ env.ENV }}-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$ENV-latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$ENV-latest

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $PROJECT_NAME-$ENV-backend \
            --query taskDefinition \
            > task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: backend
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.ENV }}-${{ github.sha }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.PROJECT_NAME }}-${{ env.ENV }}-backend
          cluster: ${{ env.PROJECT_NAME }}-${{ env.ENV }}
          wait-for-service-stability: true

      - name: Update Amplify with new backend IP
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
        run: |
          # Get new task's public IP
          TASK_ARN=$(aws ecs list-tasks \
            --cluster $PROJECT_NAME-$ENV \
            --service-name $PROJECT_NAME-$ENV-backend \
            --query "taskArns[0]" --output text)

          ENI=$(aws ecs describe-tasks \
            --cluster $PROJECT_NAME-$ENV \
            --tasks "$TASK_ARN" \
            --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value" \
            --output text)

          NEW_IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids "$ENI" \
            --query "NetworkInterfaces[0].Association.PublicIp" \
            --output text)

          echo "New backend IP: $NEW_IP"

          # Update Amplify env var
          aws amplify update-app \
            --app-id $AMPLIFY_APP_ID \
            --environment-variables BACKEND_URL=http://$NEW_IP:3000,NEXT_PUBLIC_ENV=$ENV

          # Trigger Amplify rebuild
          BRANCH=${{ github.ref == 'refs/heads/main' && 'main' || 'develop' }}
          aws amplify start-job \
            --app-id $AMPLIFY_APP_ID \
            --branch-name $BRANCH \
            --job-type RELEASE

          echo "Amplify rebuild triggered with BACKEND_URL=http://$NEW_IP:3000"
