services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - path: .env.lightsail
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - path: .env.lightsail
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  migrate:
    build:
      context: .
    env_file:
      - path: .env.lightsail
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "dist/database/migrate.js"]
    profiles:
      - tools

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - path: .env.lightsail
        required: false
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/lightsail/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
